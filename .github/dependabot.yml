version: 2
updates:
  # Keep the SHA-pinned actions current (and security-patched). Grouped into one
  # PR so a routine bump doesn't open six.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
        # Group routine bumps; let majors come as their own reviewable PRs.
        update-types: ["minor", "patch"]

  # Frontend npm dependencies.
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    groups:
      frontend:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Backend Python dependencies (uv — reads pyproject.toml + uv.lock).
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
    groups:
      backend:
        patterns: ["*"]
        update-types: ["minor", "patch"]
