name: Dependency review

# Flags dependency changes in a PR that introduce known-vulnerable packages
# before they reach main. Requires the dependency graph (on by default for
# public repositories).
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write # to post the summary comment

jobs:
  review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@e58c696e52cac8e62d61cc21fda89565d71505d7 # v4.3.1
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
