name: Deploy (reusable)

# Builds the image in ACR and rolls it out to one App Service environment.
# Called by deploy-dev.yml and deploy-prod.yml so the build/deploy/smoke logic
# lives in exactly one place. Authentication is via OIDC — no stored secrets.
#
# The caller must:
#   - grant `id-token: write` (OIDC token is minted under the caller's grant),
#   - pass `secrets: inherit` so the environment's AZURE_* secrets resolve,
#   - target a GitHub Environment that defines the ACR_NAME / APP_NAME /
#     RESOURCE_GROUP variables and the AZURE_* secrets.
on:
  workflow_call:
    inputs:
      environment:
        description: Target GitHub Environment (dev or prod).
        required: true
        type: string
      image_tag:
        description: Immutable image tag to build and deploy (commit SHA or release tag).
        required: true
        type: string
      build:
        description: Build the image in ACR first. Set false to repoint at an already-built tag (rollback).
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build image + deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Environment-scoped vars/secrets resolve against this; prod's required-
    # reviewer rule pauses the run here for approval.
    environment:
      name: ${{ inputs.environment }}
      url: https://${{ vars.APP_NAME }}.azurewebsites.net
    permissions:
      id-token: write # required for OIDC azure/login
      contents: read
    env:
      ACR_NAME: ${{ vars.ACR_NAME }}
      APP_NAME: ${{ vars.APP_NAME }}
      RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
      IMAGE_TAG: ${{ inputs.image_tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Remote build in ACR (no local Docker needed). The repo-root .dockerignore
      # keeps the uploaded context small. Tag with the immutable input tag and
      # move :latest.
      - name: Build and push image in ACR
        if: ${{ inputs.build }}
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "autocrud:$IMAGE_TAG" \
            --image "autocrud:latest" \
            --build-arg "GIT_SHA=$IMAGE_TAG" \
            --build-arg "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .

      # Point the App Service at the immutable tag (clean rollback target).
      # Changing the container image config already triggers the restart +
      # image-pull; a second explicit `az webapp restart` only cancels that
      # in-flight start (SiteStartupCancelled in the platform logs) and adds
      # churn, so we don't issue one. Updating the image directly is expected —
      # the app_service.tf lifecycle ignores docker_image_name changes.
      - name: Update App Service image
        run: |
          login_server=$(az acr show --name "$ACR_NAME" --query loginServer -o tsv)
          az webapp config container set \
            --name "$APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --container-image-name "$login_server/autocrud:$IMAGE_TAG"

      # Validate the NEW container is actually serving — not merely that /health
      # is 200. The OLD container keeps answering /health 200 until it stops, so a
      # plain status check passes *before* the new image is live and never catches
      # a bad build. /health is anonymous (excluded from EasyAuth) and echoes the
      # baked build SHA (app.build_info), so we poll until it reports BOTH
      # status=ok (snapshot loaded + DB reachable) AND the exact SHA we deployed.
      # Retry for several minutes to cover the restart + serverless SQL cold-start.
      #
      # (/version carries the same SHA but sits behind EasyAuth, so an
      # unauthenticated CI probe can't read it — /health is the anonymous gate.)
      - name: Smoke check (new container healthy + correct build)
        run: |
          host=$(az webapp show --name "$APP_NAME" --resource-group "$RESOURCE_GROUP" --query defaultHostName -o tsv)
          url="https://$host/health"
          echo "Probing $url for build $IMAGE_TAG"
          for i in $(seq 1 40); do
            body=$(curl -s --max-time 10 "$url" || echo '{}')
            status=$(echo "$body" | jq -r '.status // empty' 2>/dev/null || true)
            sha=$(echo "$body" | jq -r '.sha // empty' 2>/dev/null || true)
            if [ "$status" = "ok" ] && [ "$sha" = "$IMAGE_TAG" ]; then
              echo "Healthy and running $sha"
              exit 0
            fi
            echo "Attempt $i: status='${status:-none}' sha='${sha:-none}' (want ok / $IMAGE_TAG) — waiting..."
            sleep 10
          done
          echo "New container did not become healthy on build $IMAGE_TAG in time — failing the deploy."
          exit 1
