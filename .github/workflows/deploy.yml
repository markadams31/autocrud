name: Deploy image (reusable)

# Deploys a pre-built, scanned, attested image to one App Service environment,
# addressed by immutable digest — it never builds. Repoints the app, smoke-checks
# the NEW container, and auto-rolls-back to the previously-running image if the
# smoke check fails, so a bad release doesn't leave the environment broken.
#
# Called by deploy-dev.yml (after image.yml builds the artifact) and by
# deploy-prod.yml (after it resolves + verifies the promoted digest). The caller
# passes `secrets: inherit` and grants id-token: write.
on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      image_ref:
        description: Full immutable image reference to deploy (registry/autocrud@sha256:...).
        required: true
        type: string
      expect_sha:
        description: >-
          Commit SHA the image was built from. When set, the smoke check requires
          /health to report this exact SHA (proves the NEW container is live).
          Leave blank for a rollback to an older image whose SHA is unknown or
          predates the /health sha field — the check then falls back to status=ok.
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: ${{ inputs.environment }}
      url: https://${{ vars.APP_NAME }}.azurewebsites.net
    permissions:
      id-token: write
      contents: read
    env:
      APP_NAME: ${{ vars.APP_NAME }}
      RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
      TARGET: ${{ inputs.image_ref }}
      EXPECT_SHA: ${{ inputs.expect_sha }}
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Record what's running now so we can restore it if the smoke check fails.
      - name: Capture current image (rollback target)
        id: current
        run: |
          previous=$(az webapp config container show \
            --name "$APP_NAME" --resource-group "$RESOURCE_GROUP" \
            --query "[?name=='DOCKER_CUSTOM_IMAGE_NAME'].value | [0]" -o tsv 2>/dev/null || true)
          echo "previous=$previous" >> "$GITHUB_OUTPUT"
          echo "Currently running: ${previous:-<none>}"

      # Repoint by digest. Changing the image config already triggers the
      # restart + pull; a second explicit restart only cancels that in-flight
      # start (SiteStartupCancelled), so we don't issue one.
      - name: Repoint App Service
        run: |
          az webapp config container set \
            --name "$APP_NAME" --resource-group "$RESOURCE_GROUP" \
            --container-image-name "$TARGET"

      # Smoke-check the NEW container. /health is anonymous and echoes the build
      # SHA (app.build_info). With EXPECT_SHA set we require status=ok AND that
      # exact SHA — so the OLD container (which answers 200 until it stops) can't
      # pass the gate. Without EXPECT_SHA (rollback) we accept status=ok. Retry
      # through the restart + serverless SQL cold start.
      - name: Smoke check
        id: smoke
        run: |
          host=$(az webapp show --name "$APP_NAME" --resource-group "$RESOURCE_GROUP" --query defaultHostName -o tsv)
          url="https://$host/health"
          echo "Probing $url (expect_sha='${EXPECT_SHA:-<any>}')"
          for i in $(seq 1 40); do
            body=$(curl -s --max-time 10 "$url" || echo '{}')
            status=$(echo "$body" | jq -r '.status // empty' 2>/dev/null || true)
            sha=$(echo "$body" | jq -r '.sha // empty' 2>/dev/null || true)
            if [ "$status" = "ok" ] && { [ -z "$EXPECT_SHA" ] || [ "$sha" = "$EXPECT_SHA" ]; }; then
              echo "Healthy${EXPECT_SHA:+ and running $sha}"
              exit 0
            fi
            echo "Attempt $i: status='${status:-none}' sha='${sha:-none}' — waiting..."
            sleep 10
          done
          echo "::error::New container did not become healthy in time."
          exit 1

      # Auto-rollback: if the smoke check failed and we know what was running
      # before, restore it so the environment isn't left on a broken release.
      - name: Roll back on failed smoke
        if: ${{ failure() && steps.smoke.outcome == 'failure' && steps.current.outputs.previous != '' }}
        run: |
          echo "::warning::Smoke check failed — rolling back to ${{ steps.current.outputs.previous }}"
          az webapp config container set \
            --name "$APP_NAME" --resource-group "$RESOURCE_GROUP" \
            --container-image-name "${{ steps.current.outputs.previous }}"
          host=$(az webapp show --name "$APP_NAME" --resource-group "$RESOURCE_GROUP" --query defaultHostName -o tsv)
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://$host/health" || echo 000)
            if [ "$code" = "200" ]; then echo "Rolled back and healthy"; exit 0; fi
            sleep 10
          done
          echo "::error::Rollback did not become healthy — manual intervention needed."
          exit 1
