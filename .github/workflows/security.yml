name: Security

# Secret, SAST, dependency, and container-image scanning. Kept out of ci.yml (the
# test gate) so it can also run on a weekly schedule — catching newly-disclosed
# CVEs in code that hasn't changed, not only on PRs. Tools are installed as pinned
# release binaries / via uv rather than marketplace actions, matching this repo's
# preference (see the actionlint job in ci.yml). Findings upload to the GitHub
# Security tab (code scanning) as SARIF where the tool supports it, next to CodeQL.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC — weekly freshness sweep
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Secrets · gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so a scheduled scan covers every commit
          persist-credentials: false
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.18.4
        run: |
          curl -fsSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
      # --redact keeps any matched secret value out of the logs/report. Writes
      # SARIF first, then exits non-zero on a finding (uploaded by the next step).
      - name: Scan for secrets
        run: ./gitleaks detect --source . --redact --report-format sarif --report-path gitleaks.sarif
      - name: Upload SARIF
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

  sast:
    name: SAST · bandit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      # Scan the application only (tests are excluded via [tool.bandit] in
      # pyproject). Gate at medium severity + confidence; reviewed findings are
      # annotated inline with `# nosec`. CodeQL provides the Security-tab view for
      # Python, so bandit here is a fast, focused second opinion.
      - name: Run bandit
        run: >-
          uvx bandit@1.8.0 -c pyproject.toml -r app
          --severity-level medium --confidence-level medium

  python-deps:
    name: Dependencies · pip-audit (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      # Audit the resolved runtime dependencies (what actually ships) against the
      # PyPI advisory DB. Dev/test extras aren't exported, so the gate tracks the
      # shipped set; run pip-audit on the whole tree separately if you want dev too.
      - name: Export locked runtime requirements
        run: uv export --format requirements-txt --no-dev --no-emit-project -o requirements.txt
      - name: Run pip-audit
        run: uvx pip-audit -r requirements.txt --strict

  npm-deps:
    name: Dependencies · npm audit (frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Run npm audit
        run: npm audit --audit-level=high

  image-scan:
    name: Container image · trivy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      # Build once and load into the local daemon so trivy can scan it. Shares the
      # gha build cache with ci.yml's docker-build, so this is usually a cache hit.
      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: false
          load: true
          tags: autocrud:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Install trivy
        env:
          TRIVY_VERSION: 0.58.1
        run: |
          curl -fsSL -o trivy.tar.gz \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          tar -xzf trivy.tar.gz trivy
      # Gate on FIXABLE High/Critical so an unpatched base-image CVE doesn't block
      # every deploy, while still reporting to the Security tab via SARIF.
      - name: Scan image
        run: >-
          ./trivy image --ignore-unfixed --severity HIGH,CRITICAL
          --format sarif --output trivy.sarif --exit-code 1 autocrud:scan
      - name: Upload SARIF
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy.sarif
          category: trivy
