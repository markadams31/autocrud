name: Deploy · dev

# Every merge to main ships to the dev environment, after the full CI suite
# passes. The build/deploy logic lives in the reusable deploy.yml.
on:
  push:
    branches: [main]
  # Manual rollback/redeploy: supply a previously built tag (e.g. an earlier
  # commit SHA) to repoint dev at it without rebuilding. Leave blank to build
  # and deploy the current HEAD.
  workflow_dispatch:
    inputs:
      image_tag:
        description: Existing image tag to redeploy without rebuilding (blank = build + deploy HEAD).
        required: false
        type: string

permissions:
  contents: read
  id-token: write # OIDC token is minted under the caller's grant (used by deploy.yml)
  attestations: write # SBOM + SLSA provenance attestations (written in deploy.yml)
  pull-requests: read # caller must grant what the called ci.yml's change-detection job requests

concurrency:
  # Never cancel an in-flight deploy; just queue the next one.
  group: deploy-dev
  cancel-in-progress: false

jobs:
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy
    needs: ci
    uses: ./.github/workflows/deploy.yml
    with:
      environment: dev
      image_tag: ${{ inputs.image_tag || github.sha }}
      # Rebuild for a normal HEAD deploy; repoint-only when a prior tag is given.
      build: ${{ !inputs.image_tag }}
    secrets: inherit
